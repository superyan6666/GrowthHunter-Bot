name: GrowthHunter Bot v2.1 - 10倍股猎手

on:
  schedule:
    - cron: '0 8 * * 1,3,5'   # 周一、三、五 北京时间 16:00 自动运行
  workflow_dispatch:          # 允许手动触发

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行筛选 Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: python stock_screener.py

      - name: 提交最新结果和缓存
        run: |
          git config --global user.name "GrowthHunter Bot"
          git config --global user.email "bot@github.com"
          git add screened_stocks.md screened_stocks.csv russell2000_cache.csv
          if git diff --cached --quiet; then
            echo "没有新变化"
          else
            git commit -m "🤖 v2.1 更新：$(date +'%Y-%m-%d') 筛选结果 + 推送"
            git push
          fi
