name: BTC 15m Analyzer Scheduler

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: 

jobs:
  analyze_and_notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests numpy pandas
        pip install pandas-ta

    - name: Run BTC Analyzer Script
      # [强制加入 -u 参数，确保日志实时非缓冲打印]
      run: python -u btc_analyzer.py
      env:
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        DINGTALK_KEYWORD: 'AI'
        
        # [Phase 2 核心] LLM 架构解耦配置项，实现底层服务提供商无缝热切换
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }} # 可在 Secrets 中配置第三方兼容代理，如 https://api.deepseek.com/v1
        LLM_MODEL: ${{ vars.LLM_MODEL }} # 存放在 GitHub Variables 中方便随时修改，如 deepseek-chat 或 gpt-4o-mini
