name: BTC 15m Analyzer Scheduler

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: 

jobs:
  analyze_and_notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests "numpy<2.0.0" pandas pandas-ta

    - name: Run BTC Analyzer Script
      run: python -u btc_analyzer.py
      env:
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
        LLM_MODEL: ${{ vars.LLM_MODEL }}
        # [新增] 注入 Alpaca 凭证以支持行情抓取
        ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
        ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

    - name: Commit and Push State
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add trade_state.json || echo "No state file to add"
        git diff-index --quiet HEAD || git commit -m "chore: update trade state [skip ci]"
        git push
