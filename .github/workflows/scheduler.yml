name: BTC 15m Analyzer Scheduler

on:
  schedule:
    # 每 15 分钟触发一次
    - cron: '*/15 * * * *'
  # 允许手动在 GitHub 页面点击触发 (Workflow Dispatch)
  workflow_dispatch: 

jobs:
  analyze_and_notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        # 直接升级至 3.12，彻底避开旧版本的依赖黑洞
        python-version: '3.12'
        # 移除了 cache: 'pip'，避免因为缺少 requirements.txt 导致报错

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # 预先安装底层库以防止 pandas-ta 找不到前置依赖
        pip install requests numpy pandas
        # 安装核心计算库
        pip install pandas-ta

    - name: Run BTC Analyzer Script
      run: python btc_analyzer.py
      env:
        # 挂载钉钉 Webhook 环境变量与触发关键词
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        DINGTALK_KEYWORD: 'AI'
        # 环境变量预留（Phase 2 接入大模型使用）：
        # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
