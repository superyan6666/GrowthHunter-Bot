name: BTC 15m Analyzer Scheduler

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: 

jobs:
  analyze_and_notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests numpy pandas
        pip install pandas-ta

    - name: Run BTC Analyzer Script
      # [强制加入 -u 参数，确保日志实时非缓冲打印]
      run: python -u btc_analyzer.py
      env:
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        DINGTALK_KEYWORD: 'AI'
