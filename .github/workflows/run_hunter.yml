name: 🚀 每日运行 GrowthHunter

on:
  schedule:
    - cron: '30 20 * * 1-5' # 周一到周五运行
  workflow_dispatch:
    inputs:
      test_mode:
        description: '🧪 仅测试推送配置 (不拉取股票数据)'
        required: false
        type: boolean
        default: false

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4  # [修复警告] 升级到 v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5  # [修复警告] 升级到 v5
      with:
        python-version: '3.10'

    - name: 安装依赖包
      # [修复报错] 直接在这里安装所有需要的包，包含生成 Markdown 必须的 tabulate
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas pandas_ta requests lxml html5lib tabulate

    - name: 运行量化程序
      env:
        SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      run: |
        if [ "${{ inputs.test_mode }}" == "true" ]; then
          echo "检测到测试模式，执行推送测试..."
          python growth_hunter.py --test
        else
          echo "执行全量股票筛选..."
          python growth_hunter.py
        fi
