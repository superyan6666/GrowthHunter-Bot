name: 🚀 每日运行 GrowthHunter

on:
  schedule:
    # [修复时区与数据延迟] 调整为 UTC 22:30 (北京时间次日凌晨 6:30)，确保 Yahoo 日线数据已完全刷新就绪
    - cron: '30 22 * * 1-5'
  workflow_dispatch:
    inputs:
      test_mode:
        description: '🧪 仅测试推送配置 (不拉取股票数据)'
        required: false
        type: boolean
        default: false
      dry_run:
        description: '🏃 空跑模式 (仅选股，不发推送，不写数据库)'
        required: false
        type: boolean
        default: false

# 【防并发冲突】如果已经有正在运行的任务，自动取消旧任务或排队
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 【DevOps 最佳实践】：显式声明工作流权限，遵循最小权限原则
permissions:
  contents: read      # 仅允许读取代码库内容

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # 【健壮性优化】：设置最高运行时长，防止网络死锁导致 Actions 免费额度被耗尽
    timeout-minutes: 120

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 【性能优化】：缓存 pip 依赖库，hash 键绑定当前 yaml 文件
    - name: 缓存 Python 依赖
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('.github/workflows/run_hunter.yml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: 环境检查与依赖安装
      # [细节优化] 打印 python 和 pip 版本，方便未来排错
      # [V10.0 升级] 追加了 praw 库，激活 Reddit 散户情绪与另类数据引擎
      run: |
        python --version
        pip --version
        python -m pip install --upgrade pip
        pip install yfinance pandas pandas-ta requests lxml html5lib tabulate google-genai praw

    # 【终极补丁：记忆继承】从上一次成功的运行中下载历史数据库和缓存，实现真正的跨日增量存储
    - name: ⬇️ 下载历史数据库与股票池缓存
      uses: dawidd6/action-download-artifact@v3
      continue-on-error: true  # 第一次运行没有历史记录，允许失败继续
      with:
        github_token: ${{secrets.GITHUB_TOKEN}}
        workflow: run_hunter.yml
        workflow_conclusion: success
        name_is_regexp: true
        name: growth-hunter-artifacts-.*
        path: .

    - name: 运行量化程序
      # [V9.0/V10.0 升级] 挂载 GEMINI_API_KEY 与 REDDIT 凭证，激活双轨 AI 脑
      env:
        SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }} 
        REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      run: |
        if [ "${{ inputs.test_mode }}" == "true" ]; then
          echo "检测到测试模式，执行推送测试..."
          python growth_hunter.py --test
        elif [ "${{ inputs.dry_run }}" == "true" ]; then
          echo "执行空跑模式 (Dry Run)..."
          python growth_hunter.py --dry-run
        else
          echo "执行全量股票筛选..."
          python growth_hunter.py
        fi

    # 【终极补丁：修复 Git 仓库膨胀与冲突】将二进制数据库和报告改为 GitHub Artifacts 归档
    - name: 上传归档数据与报告为构建产物
      if: ${{ inputs.test_mode != 'true' && inputs.dry_run != 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: growth-hunter-artifacts-${{ github.run_number }}
        path: |
          growth_hunter_signals.db
          growth_hunter_results.csv
          growth_hunter_results.md
          small_cap_cache.csv
        retention-days: 90
