name: 🚀 每日运行 GrowthHunter

on:
  schedule:
    # 太平洋时间 (PT) 每天下午 1:30 运行 (美东时间下午 4:30，即美股刚收盘后)
    # 注意：cron 使用的是 UTC 时间。UTC 20:30 约等于夏令时 PT 13:30 / ET 16:30
    - cron: '30 20 * * 1-5' # 周一到周五运行
  workflow_dispatch: # 允许手动点击按钮运行

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖包
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 运行量化程序
      env:
        # 在 GitHub 仓库的 Settings -> Secrets and variables -> Actions 中配置以下机密
        SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        # 如果需要其他推送平台，也可以在这里加
        # TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        # TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python growth_hunter.py
